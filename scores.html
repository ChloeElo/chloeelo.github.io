<html>
  <meta
    name="viewport"
    content="width=device-width initial-scale=1 user-scalable=yes"
  />
  <head>
    <link rel="stylesheet" href="./styles/scores.css" />
    <link rel="icon" type="image/x-icon" href="Assets/favicon.ico" />
    <script src="./scripts/scores/scores.js" defer></script>
  </head>

  <body>
    <div class="sidesbox">
      <input type="checkbox" id="menucheck" />
      <label for="menucheck" style="display: inline-block"
        ><img id="menu" src="Assets/sidebar/b_menu.png"
      /></label>
      <img id="menu2" src="Assets/sidebar/b_menu2.png" />
      <img class="sidebar info" src="Assets/sidebar/b_notes.png" />
      <img class="sidebar info green" src="Assets/sidebar/b_notes2.png" />
      <img class="sidebar reddit" src="Assets/sidebar/b_reddit.png" />
      <img class="sidebar reddit green" src="Assets/sidebar/b_reddit2.png" />
      <img class="sidebar discord" src="Assets/sidebar/b_discord.png" />
      <img class="sidebar discord green" src="Assets/sidebar/b_discord2.png" />
      <img class="sidebar scorelink" src="Assets/sidebar/b_compare.png" />
      <img
        class="sidebar scorelink green"
        src="Assets/sidebar/b_compare2.png"
      />
    </div>
    <div>
      <select id="dataset" onchange="handleChange();">
        <option value="user">User Elo</option>
        <option value="nsfw">NSFW Elo</option>
        <option value="reddit">Reddit Karma</option>
      </select>
      <h1 id="title">
        <select id="display" onchange="changeDisplay()">
          <option value="plot">Graph</option>
          <option value="sort">Show</option>
        </select>
        Global User Elo in
        <select id="order" onchange="handleChange();">
          <option value="score">Score</option>
          <option value="image">Image</option>
          <option value="char">Character</option>
        </select>
        Order
      </h1>
    </div>
    <div class="line-break"></div>

    <div id="wrapbox" min-width="770">
      <h1 id="filter1txt" class="title2" style="display: block">Filter for</h1>
      <select
        id="filter1"
        class="title2"
        onchange="updateFilter()"
        style="display: block"
      >
        <option value="All">All</option>
      </select>
      <h1 class="title2" style="display: block">:</h1>
      <select
        id="filter2"
        class="title2"
        onchange="updateFilter()"
        style="display: block"
      >
        <option value="All">Any</option>
        <option value="Cat">Cat</option>
        <option value="Cosplay">Cosplay</option>
        <option value="Hoodie">Hoodie</option>
        <option value="None">None</option>
      </select>
      <div class="line-break"></div>
      <div id="imgbox" class="plot">
        <img
          id="simg"
          class="plot"
          style="border: 2px solid #ffffff"
          src="Assets/plotinfoblack.svg"
        />
      </div>
      <div id="plotBox" class="plot">
        <h1 id="legend" class="plot"></h1>
        <svg
          id="plot"
          class="plot"
          height="400"
          style="border: 2px solid #ffffff"
          onmousemove="updateImg(event)"
        ></svg>
      </div>
      <div class="line-break plot"></div>
      <h1 class="title2 plot">
        With
        <select id="paint" class="plot" onchange="handleChange()">
          <option value="score">Score</option>
          <option value="char">Character</option>
          <option value="type">Char:Type</option>
          <option value="scatter">Scatter</option>
        </select>
        Coloring
      </h1>
    </div>
  </body>
</html>
